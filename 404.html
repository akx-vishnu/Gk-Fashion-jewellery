<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - GK FASHION JEWELLERY</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #C9A84C;
            --gold: #D4AF37;
            --text: #2c2c2c;
            --bg: #ffffff;
            --font-main: 'Montserrat', sans-serif;
            --font-title: 'Playfair Display', serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 3rem;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: var(--font-title);
            font-size: clamp(8rem, 20vw, 15rem);
            margin: 0;
            color: var(--primary);
            opacity: 0.08;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        h2 {
            font-family: var(--font-title);
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1.5rem;
            color: #1a1a1a;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 1.1rem 3rem;
            background: var(--primary);
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 5px 20px rgba(201, 168, 76, 0.4);
            border: 2px solid var(--primary);
        }

        .btn:hover {
            transform: translateY(-5px);
            background: #e6cc80;
            border-color: #e6cc80;
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.6);
        }

        /* Subtle Animation */
        .container {
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Lost in Style</h2>
        <p>The piece you're looking for seems to have been misplaced. Don't worry, our latest collections are just a
            click away.</p>
        <a href="/" class="btn">Return to Storefront</a>
    </div>
</body>

</html>
